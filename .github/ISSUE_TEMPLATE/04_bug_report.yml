name: "🐛 バグ報告"
description: 不具合の報告
title: "[Bug] "
labels: ["type: bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する結果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の結果
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 深刻度
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: false
